<!DOCTYPE html>

<style>body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background-color: #000;
    /* Camera background */
    }
.camera-feed {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuC2LJBAKHjIeJn0efgeDp3TZKi2PAFlcxvkEHMn0hGKMc8Jkd1JqDgthVCO2UonvDxhHKbtMZ-Uz2TUemeUE5GXyok94HalUoSvMXD-hv7SQcSZwqkpXvOO_mxaVGDlUPfjrTwg_ap5Svs9f4tXvTXIpu4Z5As7_7B7RCfcTMOkLmE1Bkt0KkIf956Wtp2vNzd2MuSDJOkcjDSRbSiCEPkrOLR8n-LQcxNQmLaR-h2y2C5dpgJxhBai);
    background-size: cover;
    background-position: center
    }
.bounding-box {
    position: absolute;
    top: 15%;
    left: 10%;
    right: 15%;
    bottom: 25%;
    border: 3px solid rgba(0, 86, 210, 0.8);
    background-color: rgba(0, 86, 210, 0.1);
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(0, 86, 210, 0.4);
    transform: perspective(1000px) rotatex(10deg) rotatey(-5deg);
    pointer-events: none;
    animation: pulse-border 2s infinite ease-in-out
    }
.corner-marker {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: #0056d2;
    border-style: solid
    }
.tl {
    top: -3px;
    left: -3px;
    border-width: 4px 0 0 4px;
    border-top-left-radius: 8px
    }
.tr {
    top: -3px;
    right: -3px;
    border-width: 4px 4px 0 0;
    border-top-right-radius: 8px
    }
.bl {
    bottom: -3px;
    left: -3px;
    border-width: 0 0 4px 4px;
    border-bottom-left-radius: 8px
    }
.br {
    bottom: -3px;
    right: -3px;
    border-width: 0 4px 4px 0;
    border-bottom-right-radius: 8px
    }
@keyframes pulse-border {
    0% {
        box-shadow: 0 0 10px rgba(0, 86, 210, 0.2);
        } 50% {
        box-shadow: 0 0 25px rgba(0, 86, 210, 0.6);
        } 100% {
        box-shadow: 0 0 10px rgba(0, 86, 210, 0.2);
        }
    }
.shutter-btn {
    transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1)
    }
.shutter-btn:active {
    transform: scale(0.9)
    }
/* Suppress Shared Shells - This is a transactional/focused screen */</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style id="stitch-flutter-fit">
    html, body {
      width: 780px !important;
      height: 1768px !important;
      min-height: 1768px !important;
      max-height: 1768px !important;
      margin: 0 !important;
      overflow: hidden !important;
    }
    .h-screen, main.h-screen, [class*="h-screen"] {
      height: 1768px !important;
      min-height: 1768px !important;
    }
  </style></head>
<body class="relative w-full h-full text-on-surface">
<!-- Simulated Camera Feed -->
<div class="absolute inset-0 camera-feed" data-alt="A top-down view of a modern wooden desk. A crisp white paper document with text is placed slightly off-center. Soft natural daylight illuminates the desk, casting gentle shadows. A minimalist pen and a small succulent plant are partially visible at the edges. The scene suggests a professional, organized workspace ready for document scanning."></div>
<!-- Top Status Bar (Overlay) -->
<div class="absolute top-0 left-0 right-0 p-margin-mobile flex justify-between items-start z-10 bg-gradient-to-b from-black/50 to-transparent pt-12 pb-8">
<button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-sm flex items-center justify-center text-white hover:bg-black/60 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<div class="bg-primary/90 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 shadow-lg">
<span class="w-2 h-2 rounded-full bg-secondary-fixed animate-pulse"></span>
<span class="font-label-lg text-label-lg text-white">Auto-detecting document...</span>
</div>
<button class="w-10 h-10 rounded-full bg-black/40 backdrop-blur-sm flex items-center justify-center text-white hover:bg-black/60 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span>
</button>
</div>
<!-- Dynamic Bounding Box -->
<div class="bounding-box">
<div class="corner-marker tl"></div>
<div class="corner-marker tr"></div>
<div class="corner-marker bl"></div>
<div class="corner-marker br"></div>
<!-- Scanline animation effect -->
<div class="absolute left-0 right-0 h-1 bg-secondary-fixed/50 top-1/2 shadow-[0_0_8px_#93f2f2] animate-[scan_3s_ease-in-out_infinite]"></div>
</div>
<style>
        @keyframes scan {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
    </style>
<!-- Bottom Controls -->
<div class="absolute bottom-0 left-0 right-0 p-margin-mobile pb-12 bg-gradient-to-t from-black/80 via-black/50 to-transparent z-10 flex flex-col items-center gap-6">
<!-- Document Type Selector -->
<div class="flex gap-4 overflow-x-auto w-full justify-center px-4 no-scrollbar">
<button class="font-label-md text-label-md px-3 py-1 rounded-full bg-white/20 text-white">Whiteboard</button>
<button class="font-label-md text-label-md px-3 py-1 rounded-full bg-primary text-white font-bold shadow-[0_0_10px_rgba(0,86,210,0.5)]">Document</button>
<button class="font-label-md text-label-md px-3 py-1 rounded-full bg-white/20 text-white">ID Card</button>
<button class="font-label-md text-label-md px-3 py-1 rounded-full bg-white/20 text-white">Book</button>
</div>
<!-- Main Shutter Row -->
<div class="flex justify-between items-center w-full max-w-sm px-6">
<!-- Flash Toggle -->
<button class="flex flex-col items-center gap-1 text-white opacity-80 hover:opacity-100 transition-opacity">
<div class="w-12 h-12 rounded-full bg-black/40 flex items-center justify-center backdrop-blur-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">flash_off</span>
</div>
<span class="font-label-md text-label-md">Flash Off</span>
</button>
<!-- Shutter Button -->
<button class="shutter-btn w-20 h-20 rounded-full border-4 border-white flex items-center justify-center bg-transparent">
<div class="w-[68px] h-[68px] rounded-full bg-white flex items-center justify-center">
<div class="w-[60px] h-[60px] rounded-full border-2 border-primary bg-primary/10"></div>
</div>
</button>
<!-- Batch Mode Toggle -->
<button class="flex flex-col items-center gap-1 text-secondary-fixed hover:text-white transition-colors">
<div class="w-12 h-12 rounded-full bg-secondary-fixed/20 border border-secondary-fixed flex items-center justify-center backdrop-blur-sm relative">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">file_copy</span>
<!-- Badge -->
<span class="absolute -top-1 -right-1 w-5 h-5 bg-primary text-white font-label-md text-[10px] rounded-full flex items-center justify-center border-2 border-black">3</span>
</div>
<span class="font-label-md text-label-md">Batch On</span>
</button>
</div>
</div>
</body></html>
