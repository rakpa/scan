<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative">
<!-- Top App Bar (Destination screen intent implies back navigation is needed, so modifying slightly while keeping requested tokens) -->
<header class="bg-surface/95 dark:bg-surface-container-highest/95 backdrop-blur-md text-primary dark:text-primary-fixed font-headline-md text-headline-md docked full-width top-0 sticky z-50 border-b border-outline-variant/10 shadow-[0px_4px_12px_rgba(79,70,229,0.05)] flex justify-between items-center px-container-margin h-16 w-full">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 -ml-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-display-lg-mobile text-display-lg-mobile bg-gradient-to-r from-primary to-secondary-container bg-clip-text text-transparent ml-2 flex-grow">ScanMaster AI</span>
<div class="flex gap-2 items-center">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">more_vert</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary/20 overflow-hidden flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-sm">person</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center pt-md pb-32 px-container-margin md:max-w-4xl md:mx-auto w-full gap-lg">
<!-- Document Title & Meta -->
<div class="w-full text-center space-y-1">
<h1 class="font-headline-md text-headline-md text-on-background">Tax_Receipt_2024</h1>
<div class="flex items-center justify-center gap-2 text-outline font-label-sm text-label-sm">
<span>Oct 24, 2024</span>
<span class="w-1 h-1 rounded-full bg-outline"></span>
<span>1.2 MB</span>
<span class="w-1 h-1 rounded-full bg-outline"></span>
<span class="flex items-center text-secondary-container bg-secondary-container/10 px-2 py-0.5 rounded-full">
<span class="material-symbols-outlined text-[14px] mr-1" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified</span>
                    AI Enhanced
                </span>
</div>
</div>
<!-- Document Preview Canvas -->
<div class="w-full max-w-lg aspect-[3/4] glass-panel rounded-xl cyber-glow relative overflow-hidden flex items-center justify-center p-xs group">
<!-- Placeholder for the actual document image -->
<div class="w-full h-full bg-surface-container rounded-lg overflow-hidden relative">

<div class="absolute inset-0 bg-gradient-to-b from-secondary-container/0 via-secondary-container/20 to-secondary-container/0 h-1/4 animate-[scan_3s_ease-in-out_infinite]"></div>
</div>
<!-- Floating Action on Preview -->
<div class="absolute bottom-4 right-4 flex gap-2">
<button class="bg-surface/90 backdrop-blur text-on-surface p-2 rounded-full shadow-lg border border-outline-variant/20 hover:bg-surface active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">crop</span>
</button>
<button class="bg-surface/90 backdrop-blur text-on-surface p-2 rounded-full shadow-lg border border-outline-variant/20 hover:bg-surface active:scale-95 transition-all">
<span class="material-symbols-outlined text-[20px]">tune</span>
</button>
</div>
</div>
<!-- Action Panel -->
<div class="w-full max-w-lg space-y-4">
<button class="w-full btn-gradient text-white rounded-xl py-4 font-label-sm text-label-sm uppercase tracking-wider flex items-center justify-center gap-2 transition-all active:scale-[0.98]">

<style>

            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }

        }
