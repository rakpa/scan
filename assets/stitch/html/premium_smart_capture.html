<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        
        .viewfinder-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #57dffe; /* Cyber Cyan */
            border-style: solid;
            box-shadow: 0 0 15px rgba(87, 223, 254, 0.5);
            transition: all 0.3s ease;
        }

        .viewfinder-corner.top-left { top: 0; left: 0; border-width: 4px 0 0 4px; border-top-left-radius: 12px; }
        .viewfinder-corner.top-right { top: 0; right: 0; border-width: 4px 4px 0 0; border-top-right-radius: 12px; }
        .viewfinder-corner.bottom-left { bottom: 0; left: 0; border-width: 0 0 4px 4px; border-bottom-left-radius: 12px; }
        .viewfinder-corner.bottom-right { bottom: 0; right: 0; border-width: 0 4px 4px 0; border-bottom-right-radius: 12px; }

        @keyframes pulse-cyan {
            0%, 100% { box-shadow: 0 0 15px rgba(87, 223, 254, 0.5); border-color: rgba(87, 223, 254, 0.8); }
            50% { box-shadow: 0 0 30px rgba(87, 223, 254, 0.9); border-color: rgba(87, 223, 254, 1); }
        }

        .scanning-active .viewfinder-corner {
            animation: pulse-cyan 1.5s infinite;
        }

        .scanning-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #57dffe, transparent);
            box-shadow: 0 0 10px #57dffe;
            animation: scan 2.5s infinite linear;
            display: none;
        }

        .scanning-active .scanning-line {
            display: block;
        }

        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .glass-panel {
            background: rgba(250, 248, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(199, 196, 216, 0.3);
        }
        
        .dark .glass-panel {
            background: rgba(40, 48, 68, 0.85);
            border-top: 1px solid rgba(199, 196, 216, 0.1);
        }

        /* Suppress navigation shell as this is a focused task screen */
    </style>

<script>
        // Simple interaction scripts
        document.addEventListener('DOMContentLoaded', () => {
            const captureBtn = document.getElementById('capture-btn');
            const boundingBox = document.getElementById('bounding-box');
            const flashToggle = document.getElementById('flash-toggle');
            let isFlashOn = false;

            // Simulate capture action
            captureBtn.addEventListener('click', () => {
                // Flash effect
                const flash = document.createElement('div');
                flash.className = 'absolute inset-0 bg-white z-50 pointer-events-none transition-opacity duration-300';
                document.body.appendChild(flash);
                
                // Freeze box
                boundingBox.classList.remove('scanning-active');
                
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(() => {
                        flash.remove();
                        // Resume scanning animation
                        boundingBox.classList.add('scanning-active');
                    }, 300);
                }, 100);
            });

            // Flash toggle
            flashToggle.addEventListener('click', () => {
                isFlashOn = !isFlashOn;
                const icon = flashToggle.querySelector('span');
                if (isFlashOn) {
                    icon.textContent = 'flash_on';
                    icon.style.fontVariationSettings = "'FILL' 1";
                    flashToggle.classList.add('bg-primary/50');
                } else {
                    icon.textContent = 'flash_auto';
                    icon.style.fontVariationSettings = "'FILL' 0";
                    flashToggle.classList.remove('bg-primary/50');
                }
            });

            // Simulate slight movement of bounding box for "live" feel
            setInterval(() => {
                if(boundingBox.classList.contains('scanning-active')){
                    const rotate = (Math.random() - 0.5) * 1.5;
                    const scale = 1 + (Math.random() - 0.5) * 0.02;
                    boundingBox.style.transform = `rotate(${rotate}deg) scale(${scale})`;
                    boundingBox.style.transition = 'transform 0.5s ease-in-out';
                } else {
                     boundingBox.style.transform = `rotate(0deg) scale(1)`;
                }
            }, 500);
        });
    </script>
