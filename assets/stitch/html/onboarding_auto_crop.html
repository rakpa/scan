<style>
        body {
            background-color: #FFFFFF; /* Pure white background requested */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Neomorphic Button Styling (Level 2) */
        .btn-primary {
            background-color: #0040a1; /* primary color */
            color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Image container to handle visual balance */
        .illustration-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            max-height: 55vh;
        }

        .illustration-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* Pagination Dots */
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e2e2e4; /* surface-variant */
            transition: all 0.3s ease;
        }
        .dot.active {
            width: 24px;
            border-radius: 4px;
            background-color: #0040a1; /* primary */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-surface antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Container -->
<main class="flex flex-col h-screen w-full max-w-[480px] mx-auto relative px-margin-mobile pb-margin-mobile pt-lg">
<!-- Top Half: Illustration -->
<div class="illustration-container">
<img alt="Smart Auto-Crop Illustration" class="illustration-image w-full h-auto drop-shadow-xl animate-[fade-in-up_0.6s_ease-out]" data-alt="A modern, minimalist 3D illustration of a hand holding a sleek smartphone over a crumpled paper receipt. The phone screen displays glowing, vibrant cyan and teal edge-detection lines forming a perfect rectangle around the receipt. The background is a stark, pure white studio setting, emphasizing clean lines and high-performance technology. Soft, neomorphic drop shadows ground the elements, creating a sense of physical depth while maintaining a highly professional, light-mode productivity aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBiJcLTizX6lHEFzmQ9HVSfPkSHm6sMaYydFkJtSpBcUwDrKbqqC6CD3IrJibmItf6SZsQ7mK-85eH4xOR-g1b5eEkbIsHYu1ZamnqtesOI1c66Bhb9CY8si5OmhdoZi-LoXzX9aBI9FoSQCZ116kRIcVYH-hPl5QqGRCXilAuu4vQnj0disUQbBHVL-SZK-5Y9mJfY_mketL9JPQWxpJbmIRf5R7dKSz3odpw9ffRxB5UhcQmDnakc"/>
</div>
<!-- Bottom Half: Content -->
<div class="flex flex-col flex-1 justify-end pb-lg z-10 bg-white">
<!-- Text Content -->
<div class="text-center mb-xl animate-[fade-in-up_0.8s_ease-out]">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm tracking-tight">Smart Auto-Crop</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[300px] mx-auto leading-relaxed">
                    Automatically detects and crops your documents perfectly.
                </p>
</div>
<!-- Pagination Indicators -->
<div class="flex justify-center items-center gap-2 mb-xl animate-[fade-in_1s_ease-out]">
<div class="dot active"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
<!-- Action Button -->
<div class="w-full animate-[fade-in-up_1s_ease-out]">
<button class="btn-primary w-full py-4 font-title-lg text-title-lg flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
<!-- Skip Link (Optional but common for onboarding) -->
<div class="text-center mt-md">
<button class="font-label-lg text-label-lg text-on-surface-variant hover:text-primary transition-colors py-2 px-4 rounded-full active:bg-surface-variant/50">
                    Skip
                </button>
</div>
</div>
</main>
<!-- Tailwind Custom Animations -->
<script>
        tailwind.config.theme.extend.keyframes = {
            'fade-in-up': {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
            }
        };
