<script>
        document.addEventListener('DOMContentLoaded', () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const mainDocImage = document.getElementById('main-document-image');
            const sliderContainer = document.getElementById('intensity-slider-container');
            const rotateBtn = document.getElementById('rotate-btn');
            const docContainer = document.getElementById('document-preview-container');
            
            let rotation = 0;

            // Rotate Logic
            rotateBtn.addEventListener('click', () => {
                rotation += 90;
                // Add a subtle bounce effect using the container
                docContainer.style.transform = `scale(0.95)`;
                setTimeout(() => {
                    mainDocImage.style.transform = `rotate(${rotation}deg)`;
                    docContainer.style.transform = `scale(1)`;
                }, 150);
            });

            // Filter Selection Logic
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Reset all
                    filterBtns.forEach(b => {
                        b.classList.remove('active-filter');
                        const imgContainer = b.querySelector('div');
                        const label = b.querySelector('span');
                        
                        // Remove active styling
                        imgContainer.classList.remove('ring-primary');
                        imgContainer.classList.add('ring-transparent');
                        imgContainer.classList.remove('ring-2');
                        
                        // Remove checkmark if exists
                        const checkmark = imgContainer.querySelector('.bg-primary');
                        if (checkmark) checkmark.remove();
                        
                        // Reset text color
                        label.classList.remove('text-primary', 'font-bold');
                        label.classList.add('text-on-surface-variant');
                    });

                    // Set Active
                    btn.classList.add('active-filter');
                    const imgContainer = btn.querySelector('div');
                    const label = btn.querySelector('span');
                    const filterType = btn.dataset.filter;

                    // Add active styling
                    imgContainer.classList.remove('ring-transparent');
                    imgContainer.classList.add('ring-2', 'ring-primary');
                    
                    // Add checkmark
                    imgContainer.insertAdjacentHTML('beforeend', `
                        <div class="absolute -top-1 -right-1 w-5 h-5 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-sm z-10 transition-all duration-300 scale-in">
                            <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">check</span>
                        </div>
                    `);

                    // Set text color
                    label.classList.remove('text-on-surface-variant');
                    label.classList.add('text-primary', 'font-bold');

                    // Apply filter visually to main image (Simulated)
                    mainDocImage.style.transition = 'filter 0.3s ease';
                    switch(filterType) {
                        case 'original':
                            mainDocImage.style.filter = 'none';
                            sliderContainer.classList.add('hidden');
                            break;
                        case 'magic':
                            mainDocImage.style.filter = 'contrast(1.2) saturate(1.1) brightness(1.05)';
                            sliderContainer.classList.remove('hidden');
                            break;
                        case 'bw':
                            mainDocImage.style.filter = 'grayscale(1) contrast(1.5) brightness(1.1)';
                            sliderContainer.classList.remove('hidden');
                            break;
                        case 'gray':
                            mainDocImage.style.filter = 'grayscale(1) contrast(1.1)';
                            sliderContainer.classList.remove('hidden');
                            break;
                        case 'lighten':
                            mainDocImage.style.filter = 'brightness(1.15) contrast(0.95)';
                            sliderContainer.classList.remove('hidden');
                            break;
                    }
                });
            });
        });
    </script>
